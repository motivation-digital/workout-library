name: Deploy to Cloudflare Workers
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "681f0c5e92719198aa9688776079097e"
          WORKER_NAME: "workout-library"
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "worker.js=@src/worker.js;type=application/javascript+module" \
            -F "renderer.js=@src/renderer.js;type=application/javascript+module" \
            -F "schema.js=@src/schema.js;type=application/javascript+module" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2025-04-01","bindings":[{"type":"d1","name":"DB_CONTENT","id":"80145bdd-402d-45af-b76b-26591281a095"}],"keep_bindings":["plain_text","secret_text","secret_key"]};type=application/json')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
      - name: Enable workers.dev subdomain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "681f0c5e92719198aa9688776079097e"
          WORKER_NAME: "workout-library"
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/services/${WORKER_NAME}/environments/production/subdomain" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}'
